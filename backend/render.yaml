services:
  - type: web
    name: dvnc-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: ENVIRONMENT
        value: production
